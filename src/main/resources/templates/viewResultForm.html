<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Result Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<nav class="bg-white shadow">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex justify-between items-center h-16">

            <a th:href="@{/}" class="text-2xl font-bold text-blue-600">
                Result Viewer
            </a>

            <div class="hidden md:flex space-x-6 font-medium">
                <a th:href="@{/}" class="hover:text-blue-600">Home</a>
                <a th:href="@{/view-result}" class="hover:text-blue-600">View Result</a>
                <a th:href="@{/admin/add-result}" class="hover:text-blue-600">Add Results</a>
                <a th:href="@{/help}" class="hover:text-blue-600">Help</a>
            </div>

        </div>
    </div>
</nav>

<!-- Form -->
<section class="flex items-center justify-center mt-16 px-4">

    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

        <h1 class="text-3xl font-bold text-center text-blue-600">
            Check Your Result
        </h1>

        <p class="text-gray-500 text-center mt-2 mb-6">
            Enter your Roll Number and Date of Birth
        </p>

        <form th:action="@{/view-result}"
              th:object="${requestResultForm}"
              method="post"
              class="space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Roll Number
                </label>
                <input type="text"
                       th:field="*{rollNumber}"
                       class="w-full px-4 py-2 border rounded-lg"/>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Date of Birth
                </label>
                <input type="date"
                       th:field="*{dob}"
                       class="w-full px-4 py-2 border rounded-lg"/>
            </div>

            <button
                    type="submit"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
                View Result
            </button>

        </form>

    </div>

</section>

</body>
</html>
