<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<nav class="bg-white shadow">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex justify-between items-center h-16">

            <!-- Logo -->
            <a th:href="@{/}" class="text-2xl font-bold text-blue-600">
                Result Viewer
            </a>

            <!-- Desktop Menu -->
            <div class="hidden md:flex space-x-6 font-medium">
                <a th:href="@{/}" class="hover:text-blue-600">Home</a>
                <a th:href="@{/view-result}" class="hover:text-blue-600">View Result</a>
                <a th:href="@{/admin/add-result}" class="hover:text-blue-600">Add Results</a>
                <a th:href="@{/help}" class="hover:text-blue-600">Help</a>
            </div>

            <!-- Mobile Button -->
            <button id="menu-btn" class="md:hidden text-2xl">
                ☰
            </button>

        </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden px-4 pb-4 font-medium">
        <a th:href="@{/}" class="block py-2">Home</a>
        <a th:href="@{/view-result}" class="block py-2">View Result</a>
        <a th:href="@{/admin/add-result}" class="block py-2">Add Results</a>
        <a th:href="@{/help}" class="block py-2">Help</a>
    </div>
</nav>
</body>
</html>
